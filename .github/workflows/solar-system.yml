name: Solar System Workflow

on: 
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'
env:
  MONGO_URI: mongodb+srv://supercluster.d83jj.mongodb.net/superData
  MONGO_USERNAME: superuser
  MONGO_PASSWORD: ${{secrets.MONGO_PASSWORD}}
    
jobs:
    unit-testing:
        name: Unit Testing
        runs-on: ubuntu-latest
        steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup NodeJS Version
          uses: actions/setup-node@v4
          with:
            node-version: 20
        - name: Cache Dependencies
          uses: actions/cache@v4
          with:
            path: node_modules
            key: node-modules-${{hashFiles('package-lock.json')}}
    
        - name: Install Dependencies
          run: npm install
    
        - name: Unit Testing
          run: npm test
          
        - name: Archive Test Result
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: Mocha-Test-Result
            path: test-results.xml
    code-coverage:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Repository
            uses: actions/checkout@v4
          - name: Setup NodeJS
            uses: actions/setup-node@v4
            with:
              node-version: 18
          - name: Cache Dependencies
            uses: actions/cache@v4
            with:
              path: node_modules
              key: node-modules-${{hashFiles('package-lock.json')}}
          - name: Install NodeJS
            run: npm install
          - name: Run Code Coverage
            continue-on-error: true
            run: npm run coverage
          - name: Upload Code Coverage Results
            uses: actions/upload-artifact@v4
            with:
              name: Code-Coverage-Result
              path: coverage
              retention-days: 5
    docker-login:
      runs-on: ubuntu-latest
      needs: [unit-testing, code-coverage]
      steps:
        - name: Docker Checkout
          uses: actions/checkout@v4
        
        - name: Docker login
          uses: docker/login-action@v3
          with:
            username: ${{vars.DOCKERHUB_USERNAME}}
            password: ${{secrets.DOCKERHUB_TOKEN}}
        - name: Docker Build
          uses: docker/build-push-action@v6
          with:
            context: .
            push: false
            tag: ${{github.actor}}/solar-system:${{github.sha}}
        - name: Docker test
          run: |
            docker run -d --name solar-system -p 3000:3000 -e MONGO_URI=$MONGO_URI -e MONGO_USERNAME=$MONGO_USERNAME \
             -e MONGO_PASSWORD=$MONGO_PASSWORD ${{github.actor}}/solar-system:${{github.sha}}
            echo "Testing the Image"
            wget -q -O - 127.0.0.1:3000/live | grep live
        - name: Docker Push
          uses: docker/build-push-action@v6
          with:
            context: .
            push: true
            tag: ${{github.actor}}/solar-system:${{github.sha}}