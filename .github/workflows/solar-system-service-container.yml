name: Solar System Workflow

on: 
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'
env:
  MONGO_URI: mongodb+srv://supercluster.d83jj.mongodb.net/superData
  MONGO_USERNAME: superuser
  MONGO_PASSWORD: ${{secrets.MONGO_PASSWORD}}
    
jobs:
    unit-testing:
        name: Unit Testing
        services:
          mongo-server:
            image: siddharth67/mongo-db:non-prod
            options: 
              --name mongo
            ports:
              - 27017:27017
            env:
              MONGO_URI: 'mongodb+srv://mongo:27017/superData'
              MONGO_USERNAME: non-prod-user
              MONGO_PASSWORD: non-prod-password
        container: 
          image: node:20
        strategy:
          matrix:
            runnerOS: [ubuntu-latest]
        runs-on: ${{matrix.runnerOS}}
        steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Cache NPM dependencies
          uses: actions/cache@v4
          with:
            path: ~/.npm
            key: ${{runner.os}}-node-${{hashFiles('package-lock.json')}}
    
        - name: Install Dependencies
          run: npm install
    
        - name: Unit Testing
          run: npm test
          
        - name: Archive Test Result
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: Mocha-Test-Result
            path: test-results.xml
    code-coverage:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Repository
            uses: actions/checkout@v4
          - name: Setup NodeJS
            uses: actions/setup-node@v4
            with:
              node-version: 18
          - name: Cache NPM Dependencies
            uses: actions/cache@v4
            with:
              path: node_modules
              key: node-modules-${{hashFiles('package-lock.json')}}
          - name: Install NodeJS
            run: npm install
          - name: Run Code Coverage
            continue-on-error: true
            run: npm run coverage
          - name: Upload Code Coverage Results
            uses: actions/upload-artifact@v4
            with:
              name: Code-Coverage-Result
              path: coverage
              retention-days: 5
    docker:
      runs-on: ubuntu-latest
      needs: [unit-testing,code-coverage]
      permissions: 
        packages: write
      steps:
        - name: Checkout Repo
          uses: actions/checkout@v5

        - name: Docker Login
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{github.repository_owner}}
            password: ${{secrets.GITHUB_TOKEN}}

        - name: Docker Build and Push
          uses: docker/build-push-action@v6
          with:
            context: .
            push: false
            tags: ghcr.io/${{github.repository_owner}}/solar-system:${{github.sha}}

        - name: Docker test
          run: |
            docker run -d --name solar-system -p 3000:3000 -e MONGO_URI=$MONGO_URI -e MONGO_USERNAME=$MONGO_USERNAME -e MONGO_PASSWORD=$MONGO_PASSWORD ghcr.io/${{github.repository_owner}}/solar-system:${{github.sha}}
            echo "Testing IP "
            # use -O - to write response to stdout and provide the URL separately
            wget -q -O - http://127.0.0.1:3000/live | grep -i "live"
        - name: Docker push
          uses: docker/build-push-action@v6
          with:
            context: .
            push: true
            tags: ghcr.io/${{github.repository_owner}}/solar-system:${{github.sha}}

    dev-deploy:
      runs-on: ubuntu-latest
      needs: docker
      steps:
        - name: Checkout Repo
          uses: actions/checkout@v4

        - name: Installing kubectl
          uses: azure/setup-kubectl@v4
          with:
            version: 'v1.28.0'
        - name: KubeConfig Configuration
          uses: azure/k8s-set-context@v4
          with:
            method: kubeconfig
            kubeconfig: ${{secrets.KUBECONFIG}}

        - name: Get Cluster Details
          run: |
              kubectl version --short
              echo "--------------"
              kubectl get nodes

