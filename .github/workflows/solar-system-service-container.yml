    dev-deploy:
      runs-on: ubuntu-latest
      #needs: docker
      steps:
        - name: Checkout Repo
          uses: actions/checkout@v4

        - name: Installing kubectl
          uses: azure/setup-kubectl@v4
          with:
            version: 'v1.28.0'
        - name: Install kind binary
          run: |
            curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.21.0/kind-linux-amd64
            chmod +x ./kind
            sudo mv ./kind /usr/local/bin/kind

        - name: Create kind cluster
          run: |
            kind create cluster --name ci-cluster --wait 5m

        - name: Get Cluster Details
          run: |
              kubectl version
              echo "--------------"
              kubectl config get-contexts
              echo "--------------"
              kubectl get nodes
              kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
              kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=90s
        - name: Extract Ingress IP to environment variable
          run: |
            kubectl get svc ingress-nginx-controller -n ingress-nginx -o json
            echo "INGRESS_IP=$(kubectl -n ingress-nginx get services ingress-nginx-controller -o jsonpath="{.spec.clusterIPs[0]}")" >> $GITHUB_ENV
        - name: Token Replacement
          uses: cschleiden/replace-tokens@v1
          with:
            tokenPrefix: '_{_'
            tokenSuffix: '_}_'
            files: '["kubernetes/development/*.yaml"]'
          env:
            NAMESPACE: ${{vars.NAMESPACE}}
            REPLICAS: ${{vars.REPLICAS}}
            INGRESS_IP: ${{env.INGRESS_IP}}
            IMAGE: ghcr.io/${{github.repository_owner}}/solar-system:${{github.sha}}
        - name: Display Files
          run: |
            pwd
            cat kubernetes/development/*.yaml